version: 2

sources:
  - name: snowflake_silver
    database: RETAIL_DB
    schema: SILVER
    freshness:
      warn_after:
        count: 2
        period: hour
      error_after:
        count: 6
        period: hour
    loaded_at_field: ingestion_timestamp

    tables:
      - name: customers
        description: "Cleaned customer records written incrementally by PySpark"
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: email
            tests: [not_null]
          - name: full_name
            tests: [not_null]
          - name: customer_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "INACTIVE", "BLOCKED"]
          - name: customer_type
            tests:
              - accepted_values:
                  values: ["INDIVIDUAL", "BUSINESS"]
          - name: is_deleted
            tests:
              - not_null

