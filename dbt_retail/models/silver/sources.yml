version: 2

sources:
  - name: snowflake_silver
    database: RETAIL_DB
    schema: SILVER
    config:
      freshness:
        warn_after:
          count: 2
          period: hour
        error_after:
          count: 6
          period: hour
      loaded_at_field: ingestion_timestamp

    tables:
      - name: customers
        description: "Cleaned customer records written incrementally by PySpark"
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: email
            tests: [not_null]
          - name: full_name
            tests: [not_null]
          - name: customer_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "INACTIVE", "BLOCKED"]
          - name: customer_type
            tests:
              - accepted_values:
                  values: ["INDIVIDUAL", "BUSINESS"]
          - name: is_deleted
            tests:
              - not_null

      - name: carriers
        description: "Cleaned carrier records written incrementally by PySpark"
        columns:
          - name: carrier_id
            tests: [unique, not_null]
          - name: carrier_name
            tests: [not_null]
          - name: is_active
            tests: [not_null]
      - name: sales_channels
        description: "Cleaned sales channel records written incrementally by PySpark"
        columns:
          - name: channel_id
            tests: [unique, not_null]
          - name: channel_name
            tests: [not_null]
          - name: is_active
            tests: [not_null]

      - name: promotions
        description: "Cleaned promotion records written incrementally by PySpark"
        columns:
          - name: promotion_id
            tests: [unique, not_null]
          - name: promotion_name
            tests: [not_null]
          - name: promotion_code
            tests: [unique]
          - name: promotion_type
            tests:
              - accepted_values:
                  values: ["PERCENTAGE", "FIXED_AMOUNT", "BUY_X_GET_Y", "FREE_SHIPPING"]
          - name: is_active
            tests: [not_null]

      - name: addresses
        description: "Cleaned address records written incrementally by PySpark"
        columns:
          - name: address_id
            tests: [unique, not_null]
          - name: address_line_1
            tests: [not_null]
          - name: locality
            tests: [not_null]

