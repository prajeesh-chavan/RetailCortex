version: 2

sources:
  - name: snowflake_silver
    database: RETAIL_DB
    schema: SILVER
    config:
      freshness:
        warn_after:
          count: 2
          period: hour
        error_after:
          count: 6
          period: hour
      loaded_at_field: ingestion_timestamp

    tables:
      - name: customers
        description: "Cleaned customer records written incrementally by PySpark"
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: email
            tests: [not_null]
          - name: full_name
            tests: [not_null]
          - name: customer_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "INACTIVE", "BLOCKED"]
          - name: customer_type
            tests:
              - accepted_values:
                  values: ["INDIVIDUAL", "BUSINESS"]
          - name: is_deleted
            tests:
              - not_null

      - name: carriers
        description: "Cleaned carrier records written incrementally by PySpark"
        columns:
          - name: carrier_id
            tests: [unique, not_null]
          - name: carrier_name
            tests: [not_null]
          - name: is_active
            tests: [not_null]
            
      - name: sales_channels
        description: "Cleaned sales channel records written incrementally by PySpark"
        columns:
          - name: channel_id
            tests: [unique, not_null]
          - name: channel_name
            tests: [not_null]
          - name: is_active
            tests: [not_null]

      - name: categories
        description: "Cleaned category records written incrementally by PySpark"
        columns:
          - name: category_id
            tests: [unique, not_null]
          - name: category_name
            tests: [not_null]
            
      - name: promotions
        description: "Cleaned promotion records written incrementally by PySpark"
        columns:
          - name: promotion_id
            tests: [unique, not_null]
          - name: promotion_name
            tests: [not_null]
          - name: promotion_code
            tests: [unique]
          - name: promotion_type
            tests:
              - accepted_values:
                  values: ["PERCENTAGE", "FIXED_AMOUNT", "BUY_X_GET_Y", "FREE_SHIPPING"]
          - name: is_active
            tests: [not_null]

      - name: payments
        description: "Cleaned payment records written incrementally by PySpark"
        columns:
          - name: payment_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: payment_method
            tests:
              - accepted_values:
                  values: ["CARD", "UPI", "NET_BANKING", "WALLET", "BANK_TRANSFER", "CASH_ON_DELIVERY"]
          - name: amount
            tests: [not_null]

      - name: refunds
        description: "Cleaned refund records written incrementally by PySpark"
        columns:
          - name: refund_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: refund_amount
          
      - name: orders
        description: "Cleaned order records written incrementally by PySpark"
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: order_number
            tests: [unique, not_null]
          - name: order_status
            tests:
              - accepted_values:
                  values: ["PLACED", "CONFIRMED", "PROCESSING", "SHIPPED", "DELIVERED", "CANCELLED", "RETURNED"]
          - name: total_amount
            tests: [not_null]

      - name: order_items
        description: "Cleaned order item records written incrementally by PySpark"
        columns:
          - name: order_item_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: variant_id
            tests: [not_null]
          - name: item_status
            tests:
              - accepted_values:
                  values: ["PENDING", "CANCELLED", "PARTIALLY_FULFILLED", "FULFILLED", "PARTIALLY_RETURNED", "RETURNED"]

      - name: order_addresses
        description: "Cleaned order address records written incrementally by PySpark"
        columns:
          - name: order_address_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]

      - name: order_status_history
        description: "Cleaned order status history records written incrementally by PySpark"
        columns:
          - name: order_status_history_id
            tests: [unique, not_null]
          - name: order_id
          
      - name: inventory
        description: "Cleaned inventory records written incrementally by PySpark"
        columns:
          - name: inventory_id
            tests: [unique, not_null]
          - name: warehouse_id
            tests: [not_null]
          - name: variant_id
            tests: [not_null]

      - name: inventory_movements
        description: "Cleaned inventory movement records written incrementally by PySpark"
        columns:
          - name: movement_id
            tests: [unique, not_null]
          - name: inventory_id
          
      - name: warehouses
        description: "Cleaned warehouse records written incrementally by PySpark"
        columns:
          - name: warehouse_id
            tests: [unique, not_null]
          - name: warehouse_code
            tests: [unique, not_null]
          - name: warehouse_name
            tests: [not_null]
          - name: warehouse_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "INACTIVE", "CLOSED"]
                  
      - name: products
        description: "Cleaned product records written incrementally by PySpark"
        columns:
          - name: product_id
            tests: [unique, not_null]
          - name: product_name
            tests: [not_null]
          - name: product_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "DISCONTINUED", "OUT_OF_CATALOG"]

      - name: product_variants
        description: "Cleaned product variant records written incrementally by PySpark"
        columns:
          - name: variant_id
            tests: [unique, not_null]
          - name: product_id
            tests: [not_null]
          - name: sku
            tests: [unique, not_null]
            
      - name: customer_addresses
        description: "Cleaned customer-address mapping records written incrementally by PySpark"
        columns:
          - name: customer_address_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: address_id
          
      - name: vendors
        description: "Cleaned vendor records written incrementally by PySpark"
        columns:
          - name: vendor_id
            tests: [unique, not_null]
          - name: vendor_name
            tests: [not_null]
          - name: vendor_status
            tests:
              - accepted_values:
                  values: ["ACTIVE", "INACTIVE", "SUSPENDED"]

      - name: vendor_addresses
        description: "Cleaned vendor-address mapping records written incrementally by PySpark"
        columns:
          - name: vendor_address_id
            tests: [unique, not_null]
          - name: vendor_id
            tests: [not_null]
          - name: address_id
          
      - name: brands
        description: "Cleaned brand records written incrementally by PySpark"
        columns:
          - name: brand_id
            tests: [unique, not_null]
          - name: brand_name
            tests: [not_null]
          - name: is_active
          
      - name: addresses
        description: "Cleaned address records written incrementally by PySpark"
        columns:
          - name: address_id
            tests: [unique, not_null]
          - name: address_line_1
            tests: [not_null]
          - name: locality
            tests: [not_null]

