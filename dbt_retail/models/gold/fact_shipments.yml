version: 2

models:
  - name: fact_shipments
    description: "Shipment fact — one row per shipment, built incrementally from silver"
    columns:
      - name: shipment_key
        tests: [unique, not_null]
      - name: shipment_id
        tests: [not_null]
      - name: order_key
        tests: [not_null]
      - name: shipment_status
        tests: [not_null]
