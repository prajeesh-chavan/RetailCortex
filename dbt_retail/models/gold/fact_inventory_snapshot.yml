version: 2

models:
  - name: fact_inventory_snapshot
    description: "Daily inventory snapshot — one row per warehouse-variant per day, built as a full refresh table"
    columns:
      - name: snapshot_key
        tests: [unique, not_null]
      - name: warehouse_key
        tests: [not_null]
      - name: product_key
        tests: [not_null]
      - name: snapshot_date_key
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: quantity_available
      - name: inventory_value
