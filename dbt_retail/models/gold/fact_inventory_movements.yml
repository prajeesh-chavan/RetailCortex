version: 2

models:
  - name: fact_inventory_movements
    description: "Inventory movement fact — one row per movement event, built incrementally from silver"
    columns:
      - name: movement_key
        tests: [unique, not_null]
      - name: movement_date_key
        tests: [not_null]
      - name: warehouse_key
        tests: [not_null]
      - name: product_key
        tests: [not_null]
      - name: movement_type
        tests: [not_null]
      - name: movement_quantity
        tests: [not_null]
