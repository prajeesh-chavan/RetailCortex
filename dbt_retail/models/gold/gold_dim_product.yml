version: 2

models:
  - name: gold_dim_product
    description: "Product dimension — one row per product variant with brand, category, vendor names, built incrementally from silver"
    columns:
      - name: product_key
        description: "Surrogate key generated via dbt_utils.generate_surrogate_key"
        tests: [unique, not_null]
      - name: product_id
        description: "Natural key from source system"
        tests: [not_null]
      - name: variant_id
        tests: [unique, not_null]
      - name: sku
        tests: [unique, not_null]
      - name: product_name
        tests: [not_null]
      - name: product_status
        tests:
          - accepted_values:
              values: ["ACTIVE", "DISCONTINUED", "OUT_OF_CATALOG"]
