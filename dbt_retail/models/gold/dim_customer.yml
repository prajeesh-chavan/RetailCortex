version: 2

models:
  - name: dim_customer
    description: "Customer dimension — one row per customer, built incrementally from silver"
    columns:
      - name: customer_key
        description: "Surrogate key generated via dbt_utils.surrogate_key"
        tests: [unique, not_null]
      - name: customer_id
        description: "Natural key from source system"
        tests: [not_null]
      - name: full_name
        tests: [not_null]
      - name: email
        tests: [not_null]
      - name: customer_status
        tests:
          - accepted_values:
              values: ["ACTIVE", "INACTIVE", "BLOCKED"]
      - name: customer_type
        tests:
          - accepted_values:
              values: ["INDIVIDUAL", "BUSINESS"]
      - name: is_deleted
        tests: [not_null]
